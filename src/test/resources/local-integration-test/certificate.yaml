apiVersion: cert-manager.io/v1alpha2
kind: Certificate
metadata:
  name: localstack-cert
  namespace: default
spec:
  secretName: localstack-secret
  commonName: localhost
  dnsNames:
  - localhost
  issuerRef:
    name: selfsigning-issuer
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigning-issuer
spec:
  selfSigned: {}